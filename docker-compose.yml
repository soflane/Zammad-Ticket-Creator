version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:80"
    environment:
      # Server-side variables (no VITE_ prefix — never touch the JS bundle)
      # Mapped from VITE_* in .env so developers use a single .env file for both dev and Docker.
      - ZAMMAD_TOKEN=${ZTC_ZAMMAD_TOKEN:?Zammad API token must be set}
      - ZAMMAD_BASE_URL=${ZTC_ZAMMAD_BASE_URL:-https://your-zammad-instance.com}
      - DEFAULT_GROUP=${ZTC_DEFAULT_GROUP:-Support}
      - DEFAULT_STATE_ID=${ZTC_DEFAULT_STATE_ID:-2}
      - DEFAULT_TAGS=${ZTC_DEFAULT_TAGS:-internal,silent}
      - INTERNAL_EMAIL=${ZTC_INTERNAL_EMAIL:-internal@example.com}
    env_file:
      - .env
    restart: unless-stopped
    # Optional: Volume for custom nginx config
    # volumes:
    #   - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
